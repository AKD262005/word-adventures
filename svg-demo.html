<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { background: #1a1a2e; display: flex; flex-wrap: wrap; justify-content: center; gap: 24px; padding: 24px; font-family: system-ui; }
  .card { background: #16213e; border-radius: 24px; padding: 20px; text-align: center; border: 3px solid rgba(255,255,255,0.1); width: 280px; }
  .card h2 { color: white; margin-top: 12px; font-size: 1.4em; }
  svg { filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3)); }
</style>
</head>
<body>

<!-- SMALL -->
<div class="card">
  <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <!-- Tiny mouse -->
    <ellipse cx="100" cy="140" rx="28" ry="22" fill="#B0B0B0"/>
    <!-- ears -->
    <circle cx="80" cy="115" r="14" fill="#D0D0D0" stroke="#999" stroke-width="2"/>
    <circle cx="80" cy="115" r="8" fill="#FFB6C1"/>
    <circle cx="120" cy="115" r="14" fill="#D0D0D0" stroke="#999" stroke-width="2"/>
    <circle cx="120" cy="115" r="8" fill="#FFB6C1"/>
    <!-- head -->
    <ellipse cx="100" cy="125" rx="22" ry="18" fill="#C0C0C0"/>
    <!-- eyes -->
    <circle cx="92" cy="121" r="4" fill="#333"/>
    <circle cx="108" cy="121" r="4" fill="#333"/>
    <circle cx="93" cy="120" r="1.5" fill="white"/>
    <circle cx="109" cy="120" r="1.5" fill="white"/>
    <!-- nose -->
    <circle cx="100" cy="128" r="3" fill="#FFB6C1"/>
    <!-- whiskers -->
    <line x1="75" y1="126" x2="90" y2="128" stroke="#999" stroke-width="1.5"/>
    <line x1="75" y1="132" x2="90" y2="130" stroke="#999" stroke-width="1.5"/>
    <line x1="125" y1="126" x2="110" y2="128" stroke="#999" stroke-width="1.5"/>
    <line x1="125" y1="132" x2="110" y2="130" stroke="#999" stroke-width="1.5"/>
    <!-- tail -->
    <path d="M 128 140 Q 155 120 145 100" stroke="#999" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- size comparison lines -->
    <line x1="60" y1="165" x2="140" y2="165" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="4"/>
    <text x="100" y="185" fill="rgba(255,255,255,0.4)" text-anchor="middle" font-size="12">so tiny!</text>
  </svg>
  <h2>Small 🐁</h2>
</div>

<!-- ELEPHANT -->
<div class="card">
  <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <!-- body -->
    <ellipse cx="105" cy="130" rx="55" ry="42" fill="#8B9DC3"/>
    <!-- legs -->
    <rect x="65" y="155" width="18" height="30" rx="8" fill="#7B8DB3"/>
    <rect x="90" y="158" width="18" height="28" rx="8" fill="#7B8DB3"/>
    <rect x="115" y="155" width="18" height="30" rx="8" fill="#7B8DB3"/>
    <rect x="138" y="158" width="18" height="28" rx="8" fill="#7B8DB3"/>
    <!-- feet -->
    <ellipse cx="74" cy="186" rx="11" ry="5" fill="#6B7DA3"/>
    <ellipse cx="99" cy="187" rx="11" ry="5" fill="#6B7DA3"/>
    <ellipse cx="124" cy="186" rx="11" ry="5" fill="#6B7DA3"/>
    <ellipse cx="147" cy="187" rx="11" ry="5" fill="#6B7DA3"/>
    <!-- head -->
    <circle cx="65" cy="100" r="32" fill="#8B9DC3"/>
    <!-- ear -->
    <ellipse cx="38" cy="90" rx="22" ry="28" fill="#7B8DB3"/>
    <ellipse cx="40" cy="90" rx="14" ry="20" fill="#C4A7D7"/>
    <!-- eye -->
    <circle cx="72" cy="92" r="6" fill="white"/>
    <circle cx="74" cy="92" r="4" fill="#333"/>
    <circle cx="75" cy="91" r="1.5" fill="white"/>
    <!-- trunk -->
    <path d="M 55 110 Q 40 130 35 145 Q 33 155 40 155 Q 47 155 48 145 Q 50 135 58 120" stroke="#7B8DB3" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- tusk -->
    <path d="M 60 115 Q 55 125 58 130" stroke="ivory" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- tail -->
    <path d="M 160 125 Q 170 115 168 105" stroke="#7B8DB3" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- blush -->
    <circle cx="55" cy="102" r="5" fill="rgba(255,150,150,0.3)"/>
  </svg>
  <h2>Big 🐘</h2>
</div>

<!-- COLD -->
<div class="card">
  <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <!-- snowflakes -->
    <text x="30" y="30" font-size="16" fill="rgba(200,230,255,0.6)">❄</text>
    <text x="160" y="50" font-size="20" fill="rgba(200,230,255,0.5)">❄</text>
    <text x="45" y="75" font-size="12" fill="rgba(200,230,255,0.4)">❄</text>
    <text x="155" y="160" font-size="14" fill="rgba(200,230,255,0.5)">❄</text>
    <text x="20" y="160" font-size="18" fill="rgba(200,230,255,0.4)">❄</text>
    <!-- penguin body -->
    <ellipse cx="100" cy="135" rx="35" ry="42" fill="#2C3E50"/>
    <!-- belly -->
    <ellipse cx="100" cy="142" rx="22" ry="30" fill="white"/>
    <!-- head -->
    <circle cx="100" cy="85" r="26" fill="#2C3E50"/>
    <!-- eyes -->
    <circle cx="90" cy="80" r="5" fill="white"/>
    <circle cx="110" cy="80" r="5" fill="white"/>
    <circle cx="91" cy="80" r="3" fill="#333"/>
    <circle cx="111" cy="80" r="3" fill="#333"/>
    <circle cx="92" cy="79" r="1" fill="white"/>
    <circle cx="112" cy="79" r="1" fill="white"/>
    <!-- beak -->
    <polygon points="95,88 105,88 100,96" fill="#F39C12"/>
    <!-- scarf -->
    <path d="M 74 100 Q 100 115 126 100" stroke="#E74C3C" stroke-width="8" fill="none" stroke-linecap="round"/>
    <rect x="118" y="100" width="8" height="25" rx="3" fill="#E74C3C"/>
    <rect x="112" y="100" width="8" height="20" rx="3" fill="#C0392B"/>
    <!-- feet -->
    <ellipse cx="85" cy="178" rx="12" ry="5" fill="#F39C12"/>
    <ellipse cx="115" cy="178" rx="12" ry="5" fill="#F39C12"/>
    <!-- shiver lines -->
    <path d="M 140 95 L 145 90 L 150 95 L 155 90" stroke="rgba(200,230,255,0.6)" stroke-width="2" fill="none"/>
    <path d="M 50 105 L 55 100 L 60 105 L 65 100" stroke="rgba(200,230,255,0.6)" stroke-width="2" fill="none"/>
    <!-- breath -->
    <ellipse cx="130" cy="88" rx="8" ry="5" fill="rgba(200,230,255,0.2)"/>
    <ellipse cx="140" cy="84" rx="6" ry="4" fill="rgba(200,230,255,0.15)"/>
  </svg>
  <h2>Cold 🥶</h2>
</div>

</body>
</html>
