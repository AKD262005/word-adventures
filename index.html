<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Word Adventures! 🌟</title>
<style>
  :root {
    --pink: #FF6B9D;
    --purple: #C44DFF;
    --blue: #4DC9FF;
    --green: #4DFF88;
    --yellow: #FFD93D;
    --orange: #FF8C42;
    --red: #FF4D6A;
    --bg: #1a1a2e;
    --card-bg: #16213e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--purple), var(--pink));
    padding: 16px 20px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .header h1 {
    font-size: 1.6em;
    letter-spacing: 1px;
  }

  .stars-display {
    font-size: 1.1em;
    margin-top: 4px;
    opacity: 0.9;
  }

  /* Navigation */
  .nav {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    background: rgba(0,0,0,0.2);
  }
  .nav::-webkit-scrollbar { display: none; }

  .nav-btn {
    flex-shrink: 0;
    padding: 10px 20px;
    border-radius: 25px;
    border: 2px solid rgba(255,255,255,0.2);
    background: var(--card-bg);
    color: white;
    font-size: 1em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    white-space: nowrap;
  }

  .nav-btn.active {
    background: var(--purple);
    border-color: var(--purple);
    transform: scale(1.05);
  }

  .nav-btn:hover { transform: scale(1.05); }

  /* Mode tabs */
  .mode-tabs {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 12px 16px;
  }

  .mode-tab {
    padding: 10px 28px;
    border-radius: 20px;
    border: none;
    font-size: 1.05em;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    background: var(--card-bg);
    color: rgba(255,255,255,0.6);
  }

  .mode-tab.active {
    background: var(--yellow);
    color: #1a1a2e;
  }

  /* Card Grid */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    padding: 16px;
    max-width: 500px;
    margin: 0 auto;
  }

  .card {
    background: var(--card-bg);
    border-radius: 24px;
    padding: 20px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: 3px solid transparent;
    position: relative;
    overflow: hidden;
    min-height: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .card:active {
    transform: scale(0.92);
  }

  .card.pop {
    animation: popBounce 0.6s ease;
  }

  @keyframes popBounce {
    0% { transform: scale(1); }
    30% { transform: scale(1.15); }
    50% { transform: scale(0.95); }
    70% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  .card-emoji {
    font-size: 3.5em;
    margin-bottom: 8px;
    display: block;
    line-height: 1.2;
  }

  .card-word {
    font-size: 1.3em;
    font-weight: 700;
    margin-bottom: 4px;
    transition: all 0.3s;
  }

  .card-sub {
    font-size: 0.85em;
    opacity: 0.7;
    font-style: italic;
  }

  .card-pinyin {
    font-size: 0.8em;
    opacity: 0.6;
    margin-top: 2px;
  }

  /* Language indicator on card */
  .lang-indicator {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    justify-content: center;
  }

  .lang-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    opacity: 0.3;
    transition: all 0.3s;
  }

  .lang-dot.active { opacity: 1; transform: scale(1.3); }
  .lang-dot.en { background: var(--blue); }
  .lang-dot.es { background: var(--orange); }
  .lang-dot.zh { background: var(--red); }

  /* Card colors */
  .card[data-color="pink"] { border-color: var(--pink); background: linear-gradient(145deg, var(--card-bg), rgba(255,107,157,0.15)); }
  .card[data-color="purple"] { border-color: var(--purple); background: linear-gradient(145deg, var(--card-bg), rgba(196,77,255,0.15)); }
  .card[data-color="blue"] { border-color: var(--blue); background: linear-gradient(145deg, var(--card-bg), rgba(77,201,255,0.15)); }
  .card[data-color="green"] { border-color: var(--green); background: linear-gradient(145deg, var(--card-bg), rgba(77,255,136,0.15)); }
  .card[data-color="yellow"] { border-color: var(--yellow); background: linear-gradient(145deg, var(--card-bg), rgba(255,217,61,0.15)); }
  .card[data-color="orange"] { border-color: var(--orange); background: linear-gradient(145deg, var(--card-bg), rgba(255,140,66,0.15)); }

  /* Quiz Mode */
  .quiz-container {
    text-align: center;
    padding: 20px;
    max-width: 500px;
    margin: 0 auto;
    display: none;
  }

  .quiz-prompt {
    font-size: 1.4em;
    margin-bottom: 8px;
    font-weight: 700;
  }

  .quiz-prompt-sub {
    font-size: 1em;
    opacity: 0.7;
    margin-bottom: 20px;
  }

  .quiz-speaker-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    color: white;
    font-size: 2.2em;
    cursor: pointer;
    margin: 0 auto 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(196,77,255,0.4);
    transition: transform 0.2s;
  }

  .quiz-speaker-btn:active { transform: scale(0.9); }
  .quiz-speaker-btn.speaking { animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 4px 20px rgba(196,77,255,0.4); }
    50% { box-shadow: 0 4px 40px rgba(196,77,255,0.8); }
  }

  .quiz-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }

  .quiz-option {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 20px;
    font-size: 3em;
    cursor: pointer;
    border: 3px solid rgba(255,255,255,0.1);
    transition: all 0.3s;
  }

  .quiz-option:active { transform: scale(0.92); }
  .quiz-option.correct {
    border-color: var(--green);
    background: rgba(77,255,136,0.2);
    animation: popBounce 0.6s ease;
  }
  .quiz-option.wrong {
    border-color: var(--red);
    background: rgba(255,77,106,0.2);
    animation: shake 0.5s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .quiz-score {
    font-size: 1.2em;
    margin-top: 16px;
    opacity: 0.8;
  }

  .quiz-lang-label {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 12px;
    font-size: 0.85em;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .quiz-lang-label.es { background: var(--orange); color: #1a1a2e; }
  .quiz-lang-label.zh { background: var(--red); color: white; }

  /* Celebration overlay */
  .celebration {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 200;
  }

  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall 2s ease-out forwards;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  .star-burst {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 4em;
    animation: starPop 1s ease forwards;
    pointer-events: none;
    z-index: 201;
  }

  @keyframes starPop {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    40% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
  }

  /* Progress bar */
  .progress-section {
    padding: 12px 16px;
    max-width: 500px;
    margin: 0 auto;
  }

  .progress-bar {
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--yellow));
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .progress-label {
    font-size: 0.8em;
    opacity: 0.6;
    margin-top: 4px;
    text-align: center;
  }

  /* Footer spacer */
  .spacer { height: 40px; }

  /* Language selector */
  .lang-selector {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 8px 16px;
  }

  .lang-btn {
    padding: 8px 16px;
    border-radius: 16px;
    border: 2px solid rgba(255,255,255,0.15);
    background: transparent;
    color: rgba(255,255,255,0.6);
    font-size: 0.9em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
  }

  .lang-btn.active {
    border-color: currentColor;
    color: white;
  }

  .lang-btn.en.active { background: rgba(77,201,255,0.2); border-color: var(--blue); }
  .lang-btn.es.active { background: rgba(255,140,66,0.2); border-color: var(--orange); }
  .lang-btn.zh.active { background: rgba(255,77,106,0.2); border-color: var(--red); }
</style>
</head>
<body>

<div class="header">
  <h1>Word Adventures! 🌟</h1>
  <div class="stars-display" id="starsDisplay">⭐ 0 stars</div>
</div>

<!-- Topic nav -->
<div class="nav" id="topicNav">
  <button class="nav-btn active" data-topic="animals">🐱 Animals</button>
  <button class="nav-btn" data-topic="colors">🎨 Colors</button>
  <button class="nav-btn" data-topic="family">👨‍👩‍👧 Family</button>
  <button class="nav-btn" data-topic="food">🍎 Food</button>
  <button class="nav-btn" data-topic="body">👀 Body</button>
  <button class="nav-btn" data-topic="actions">🏃 Actions</button>
</div>

<!-- Mode tabs -->
<div class="mode-tabs">
  <button class="mode-tab active" data-mode="explore">Explore</button>
  <button class="mode-tab" data-mode="quiz">Quiz</button>
</div>

<!-- Language selector (Explore mode) -->
<div class="lang-selector" id="langSelector">
  <button class="lang-btn en active" data-lang="en">🇺🇸 English</button>
  <button class="lang-btn es active" data-lang="es">🇲🇽 Spanish</button>
  <button class="lang-btn zh active" data-lang="zh">🇨🇳 Chinese</button>
</div>

<!-- Progress -->
<div class="progress-section">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel">Tap to explore!</div>
</div>

<!-- Explore mode -->
<div class="card-grid" id="cardGrid"></div>

<!-- Quiz mode -->
<div class="quiz-container" id="quizContainer">
  <div class="quiz-prompt" id="quizPrompt">Find the animal!</div>
  <div class="quiz-lang-label es" id="quizLangLabel">Spanish</div>
  <button class="quiz-speaker-btn" id="quizSpeaker" onclick="replayQuizAudio()">🔊</button>
  <div class="quiz-grid" id="quizGrid"></div>
  <div class="quiz-score" id="quizScore"></div>
</div>

<div class="celebration" id="celebration"></div>
<div class="spacer"></div>

<script>
// ============ DATA ============
const DATA = {
  animals: {
    label: "Animals",
    items: [
      { emoji: "🐱", en: "cat", es: "gato", zh: "猫", zhPinyin: "māo" },
      { emoji: "🐶", en: "dog", es: "perro", zh: "狗", zhPinyin: "gǒu" },
      { emoji: "🦆", en: "duck", es: "pato", zh: "鸭", zhPinyin: "yā" },
      { emoji: "🐟", en: "fish", es: "pez", zh: "鱼", zhPinyin: "yú" },
      { emoji: "🐦", en: "bird", es: "pájaro", zh: "鸟", zhPinyin: "niǎo" },
      { emoji: "🦋", en: "butterfly", es: "mariposa", zh: "蝴蝶", zhPinyin: "húdié" },
    ],
    colors: ["pink", "blue", "green", "orange", "purple", "yellow"]
  },
  colors: {
    label: "Colors",
    items: [
      { emoji: "🔴", en: "red", es: "rojo", zh: "红", zhPinyin: "hóng" },
      { emoji: "🔵", en: "blue", es: "azul", zh: "蓝", zhPinyin: "lán" },
      { emoji: "🟢", en: "green", es: "verde", zh: "绿", zhPinyin: "lǜ" },
      { emoji: "🟡", en: "yellow", es: "amarillo", zh: "黄", zhPinyin: "huáng" },
      { emoji: "🟣", en: "purple", es: "morado", zh: "紫", zhPinyin: "zǐ" },
      { emoji: "🟠", en: "orange", es: "naranja", zh: "橙", zhPinyin: "chéng" },
    ],
    colors: ["pink", "blue", "green", "yellow", "purple", "orange"]
  },
  family: {
    label: "Family",
    items: [
      { emoji: "👩", en: "mom", es: "mamá", zh: "妈妈", zhPinyin: "māma" },
      { emoji: "👨", en: "dad", es: "papá", zh: "爸爸", zhPinyin: "bàba" },
      { emoji: "👵", en: "grandma", es: "abuela", zh: "奶奶", zhPinyin: "nǎinai" },
      { emoji: "👴", en: "grandpa", es: "abuelo", zh: "爷爷", zhPinyin: "yéye" },
      { emoji: "👶", en: "baby", es: "bebé", zh: "宝宝", zhPinyin: "bǎobao" },
      { emoji: "🧒", en: "friend", es: "amigo", zh: "朋友", zhPinyin: "péngyou" },
    ],
    colors: ["pink", "blue", "green", "orange", "purple", "yellow"]
  },
  food: {
    label: "Food",
    items: [
      { emoji: "🍎", en: "apple", es: "manzana", zh: "苹果", zhPinyin: "píngguǒ" },
      { emoji: "🍌", en: "banana", es: "plátano", zh: "香蕉", zhPinyin: "xiāngjiāo" },
      { emoji: "🥛", en: "milk", es: "leche", zh: "牛奶", zhPinyin: "niúnǎi" },
      { emoji: "💧", en: "water", es: "agua", zh: "水", zhPinyin: "shuǐ" },
      { emoji: "🍪", en: "cookie", es: "galleta", zh: "饼干", zhPinyin: "bǐnggān" },
      { emoji: "🍦", en: "ice cream", es: "helado", zh: "冰淇淋", zhPinyin: "bīngqílín" },
    ],
    colors: ["pink", "blue", "green", "orange", "purple", "yellow"]
  },
  body: {
    label: "Body",
    items: [
      { emoji: "👀", en: "eyes", es: "ojos", zh: "眼睛", zhPinyin: "yǎnjing" },
      { emoji: "👃", en: "nose", es: "nariz", zh: "鼻子", zhPinyin: "bízi" },
      { emoji: "👄", en: "mouth", es: "boca", zh: "嘴巴", zhPinyin: "zuǐba" },
      { emoji: "🤲", en: "hands", es: "manos", zh: "手", zhPinyin: "shǒu" },
      { emoji: "🦶", en: "feet", es: "pies", zh: "脚", zhPinyin: "jiǎo" },
      { emoji: "🫃", en: "belly", es: "barriga", zh: "肚子", zhPinyin: "dùzi" },
    ],
    colors: ["pink", "blue", "green", "orange", "purple", "yellow"]
  },
  actions: {
    label: "Actions",
    items: [
      { emoji: "🏃", en: "run", es: "correr", zh: "跑", zhPinyin: "pǎo" },
      { emoji: "🤸", en: "jump", es: "saltar", zh: "跳", zhPinyin: "tiào" },
      { emoji: "💃", en: "dance", es: "bailar", zh: "跳舞", zhPinyin: "tiàowǔ" },
      { emoji: "🎤", en: "sing", es: "cantar", zh: "唱歌", zhPinyin: "chànggē" },
      { emoji: "😴", en: "sleep", es: "dormir", zh: "睡觉", zhPinyin: "shuìjiào" },
      { emoji: "🍽️", en: "eat", es: "comer", zh: "吃", zhPinyin: "chī" },
    ],
    colors: ["pink", "blue", "green", "orange", "purple", "yellow"]
  }
};

// ============ STATE ============
let currentTopic = 'animals';
let currentMode = 'explore';
let stars = parseInt(localStorage.getItem('wordadv_stars') || '0');
let explored = JSON.parse(localStorage.getItem('wordadv_explored') || '{}');
let quizState = { current: null, score: 0, total: 0, lang: 'es', queue: [] };
let activeLangs = { en: true, es: true, zh: true };

updateStarsDisplay();

// ============ SPEECH ============
function speak(text, lang, onEnd) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);

  if (lang === 'es') {
    utter.lang = 'es-MX';
    utter.rate = 0.8;
  } else if (lang === 'zh') {
    utter.lang = 'zh-CN';
    utter.rate = 0.7;
  } else {
    utter.lang = 'en-US';
    utter.rate = 0.85;
  }

  utter.pitch = 1.1;
  if (onEnd) utter.onend = onEnd;
  window.speechSynthesis.speak(utter);
}

function speakSequence(items, idx = 0) {
  if (idx >= items.length) return;
  speak(items[idx].text, items[idx].lang, () => {
    setTimeout(() => speakSequence(items, idx + 1), 300);
  });
}

// ============ EXPLORE MODE ============
function renderCards() {
  const grid = document.getElementById('cardGrid');
  const topic = DATA[currentTopic];
  grid.innerHTML = '';
  grid.style.display = 'grid';
  document.getElementById('quizContainer').style.display = 'none';
  document.getElementById('langSelector').style.display = 'flex';

  topic.items.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.color = topic.colors[i];
    card.dataset.index = i;

    let wordHtml = '';
    if (activeLangs.en) wordHtml += `<div class="card-word" style="color:var(--blue)">${item.en}</div>`;
    if (activeLangs.es) wordHtml += `<div class="card-word" style="color:var(--orange)">${item.es}</div>`;
    if (activeLangs.zh) wordHtml += `<div class="card-word" style="color:var(--red)">${item.zh}</div>`;
    if (activeLangs.zh) wordHtml += `<div class="card-pinyin">${item.zhPinyin}</div>`;

    card.innerHTML = `
      <span class="card-emoji">${item.emoji}</span>
      ${wordHtml}
      <div class="lang-indicator">
        <div class="lang-dot en"></div>
        <div class="lang-dot es"></div>
        <div class="lang-dot zh"></div>
      </div>
    `;

    card.addEventListener('click', () => tapCard(card, item, i));
    grid.appendChild(card);
  });

  updateProgress();
}

function tapCard(card, item, index) {
  card.classList.remove('pop');
  void card.offsetWidth;
  card.classList.add('pop');

  // Build speech sequence based on active languages
  const seq = [];
  if (activeLangs.en) seq.push({ text: item.en, lang: 'en' });
  if (activeLangs.es) seq.push({ text: item.es, lang: 'es' });
  if (activeLangs.zh) seq.push({ text: item.zh, lang: 'zh' });

  // Animate dots
  const dots = card.querySelectorAll('.lang-dot');
  let dotIdx = 0;
  const activeDots = [];
  dots.forEach(d => {
    d.classList.remove('active');
    const lang = d.classList.contains('en') ? 'en' : d.classList.contains('es') ? 'es' : 'zh';
    if (activeLangs[lang]) activeDots.push(d);
  });

  function animateDot() {
    if (dotIdx < activeDots.length) {
      activeDots[dotIdx].classList.add('active');
      dotIdx++;
    }
  }

  animateDot();
  const dotInterval = setInterval(() => {
    animateDot();
  }, 1200);

  setTimeout(() => clearInterval(dotInterval), seq.length * 1200 + 500);

  speakSequence(seq);

  // Track exploration
  const key = `${currentTopic}_${index}`;
  if (!explored[key]) {
    explored[key] = true;
    localStorage.setItem('wordadv_explored', JSON.stringify(explored));
    stars++;
    localStorage.setItem('wordadv_stars', stars.toString());
    updateStarsDisplay();
    updateProgress();

    if (Object.keys(explored).filter(k => k.startsWith(currentTopic)).length === DATA[currentTopic].items.length) {
      setTimeout(() => celebrate(), 800);
    }
  }
}

// ============ QUIZ MODE ============
function startQuiz() {
  const grid = document.getElementById('cardGrid');
  grid.style.display = 'none';
  document.getElementById('quizContainer').style.display = 'block';
  document.getElementById('langSelector').style.display = 'none';

  const langs = ['es', 'zh'];
  quizState.lang = langs[Math.floor(Math.random() * langs.length)];
  quizState.score = 0;
  quizState.total = 0;

  // Build queue: shuffle items
  quizState.queue = [...DATA[currentTopic].items].sort(() => Math.random() - 0.5);
  nextQuizQuestion();
}

function nextQuizQuestion() {
  if (quizState.queue.length === 0) {
    // Reshuffle
    quizState.queue = [...DATA[currentTopic].items].sort(() => Math.random() - 0.5);
    // Switch language
    quizState.lang = quizState.lang === 'es' ? 'zh' : 'es';
  }

  const correct = quizState.queue.pop();
  quizState.current = correct;

  // Pick 3 wrong answers
  const others = DATA[currentTopic].items.filter(x => x.en !== correct.en);
  const shuffled = others.sort(() => Math.random() - 0.5).slice(0, 3);
  const options = [correct, ...shuffled].sort(() => Math.random() - 0.5);

  const langLabel = document.getElementById('quizLangLabel');
  langLabel.className = `quiz-lang-label ${quizState.lang}`;
  langLabel.textContent = quizState.lang === 'es' ? '🇲🇽 Spanish' : '🇨🇳 Chinese';

  document.getElementById('quizPrompt').textContent = `Find the ${correct[quizState.lang]}!`;

  // Speak the word
  speak(correct[quizState.lang], quizState.lang);

  const quizGrid = document.getElementById('quizGrid');
  quizGrid.innerHTML = '';

  options.forEach(opt => {
    const btn = document.createElement('div');
    btn.className = 'quiz-option';
    btn.textContent = opt.emoji;
    btn.addEventListener('click', () => handleQuizAnswer(btn, opt, correct));
    quizGrid.appendChild(btn);
  });

  document.getElementById('quizScore').textContent = 
    quizState.total > 0 ? `${quizState.score} / ${quizState.total} correct ⭐` : '';
}

function handleQuizAnswer(btn, chosen, correct) {
  quizState.total++;

  if (chosen.en === correct.en) {
    btn.classList.add('correct');
    quizState.score++;
    stars++;
    localStorage.setItem('wordadv_stars', stars.toString());
    updateStarsDisplay();

    speak(correct[quizState.lang], quizState.lang, () => {
      speak(`Yes! ${correct.en}!`, 'en');
    });

    if (quizState.score % 5 === 0) celebrate();

    setTimeout(nextQuizQuestion, 1500);
  } else {
    btn.classList.add('wrong');
    speak("Try again!", 'en');
    setTimeout(() => btn.classList.remove('wrong'), 500);
  }

  document.getElementById('quizScore').textContent = `${quizState.score} / ${quizState.total} correct ⭐`;
}

function replayQuizAudio() {
  if (quizState.current) {
    const btn = document.getElementById('quizSpeaker');
    btn.classList.add('speaking');
    speak(quizState.current[quizState.lang], quizState.lang, () => {
      btn.classList.remove('speaking');
    });
  }
}

// ============ CELEBRATIONS ============
function celebrate() {
  const cel = document.getElementById('celebration');
  cel.innerHTML = '';

  // Confetti
  const colors = ['#FF6B9D', '#C44DFF', '#4DC9FF', '#4DFF88', '#FFD93D', '#FF8C42'];
  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = Math.random() * 0.5 + 's';
    c.style.width = (6 + Math.random() * 8) + 'px';
    c.style.height = (6 + Math.random() * 8) + 'px';
    cel.appendChild(c);
  }

  // Star burst
  const star = document.createElement('div');
  star.className = 'star-burst';
  star.textContent = '🌟';
  cel.appendChild(star);

  speak("Amazing! Great job!", 'en');

  setTimeout(() => cel.innerHTML = '', 2500);
}

// ============ UI UPDATES ============
function updateStarsDisplay() {
  document.getElementById('starsDisplay').textContent = `⭐ ${stars} star${stars !== 1 ? 's' : ''}`;
}

function updateProgress() {
  const items = DATA[currentTopic].items;
  const explored_count = items.filter((_, i) => explored[`${currentTopic}_${i}`]).length;
  const pct = (explored_count / items.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = 
    explored_count === items.length 
      ? `${DATA[currentTopic].label} complete! 🎉` 
      : `${explored_count} / ${items.length} explored`;
}

// ============ NAV ============
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTopic = btn.dataset.topic;
    if (currentMode === 'explore') renderCards();
    else startQuiz();
  });
});

document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentMode = tab.dataset.mode;
    if (currentMode === 'explore') renderCards();
    else startQuiz();
  });
});

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const lang = btn.dataset.lang;
    // Don't allow deselecting all
    const activeCount = Object.values(activeLangs).filter(Boolean).length;
    if (activeLangs[lang] && activeCount <= 1) return;

    activeLangs[lang] = !activeLangs[lang];
    btn.classList.toggle('active', activeLangs[lang]);
    renderCards();
  });
});

// ============ iOS AUDIO UNLOCK ============
let audioUnlocked = false;

function unlockAudio() {
  if (audioUnlocked) return;
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance('');
    u.volume = 0;
    speechSynthesis.speak(u);
  }
  audioUnlocked = true;
}

// iOS requires user gesture to init audio
document.addEventListener('touchstart', unlockAudio, { once: true });
document.addEventListener('click', unlockAudio, { once: true });

// ============ INIT ============
renderCards();

// Preload voices — iOS needs a delay
if ('speechSynthesis' in window) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  // iOS workaround: keep speech synthesis alive
  setInterval(() => {
    if (speechSynthesis.paused) speechSynthesis.resume();
  }, 300);
}
</script>
